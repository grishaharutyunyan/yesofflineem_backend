name: Deploy backend

on:
  push:
    branches:
      - main
    paths:
      - 'yesofflineem_backend/**'

jobs:
  deploy:
    name: Build & reload backend
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host:        ${{ secrets.SERVER_HOST }}
          username:    ${{ secrets.SERVER_USER }}
          key:         ${{ secrets.SERVER_SSH_KEY }}
          port:        ${{ secrets.SERVER_PORT || 22 }}
          script_stop: true
          script: |
            set -e
            cd ~/apps/yes
            git pull origin main

            cd yesofflineem_backend
            npm ci --omit=dev
            npm run build
            pm2 reload yesofflineem-backend --update-env

            echo "✓ backend deployed"
